    /* ── SEARCH PAGE HERO ── */
    .search-hero {
      min-height: 56vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 140px 24px 56px; text-align: center; position: relative; overflow: hidden;
    }
    .search-hero-glow {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 700px; height: 360px;
      background: conic-gradient(from 180deg at 50% 0%,
        rgba(167,139,250,0.18), rgba(96,165,250,0.12), rgba(255,107,174,0.14), rgba(167,139,250,0.18));
      border-radius: 0 0 50% 50%; filter: blur(70px); pointer-events: none;
    }
    .search-hero h1 { font-size: clamp(2rem, 5vw, 3.4rem); font-weight: 900; letter-spacing: -0.04em; line-height: 1.1; margin-bottom: 14px; }
    .search-hero > p { font-size: 1rem; color: var(--muted); margin-bottom: 40px; max-width: 480px; line-height: 1.75; }

    .search-bar-big {
      display: flex; align-items: center; gap: 0;
      background: var(--surface); border: 1.5px solid rgba(167,139,250,0.35);
      border-radius: 100px; width: 100%; max-width: 680px; padding: 6px 6px 6px 24px;
      box-shadow: 0 8px 40px rgba(167,139,250,0.15); transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar-big:focus-within { border-color: #a78bfa; box-shadow: 0 8px 40px rgba(167,139,250,0.28); }
    .search-bar-big span { font-size: 1.2rem; margin-right: 12px; flex-shrink: 0; }
    .search-bar-big input {
      flex: 1; background: none; border: none; outline: none;
      font-size: 1.05rem; color: var(--text); font-family: inherit;
      min-width: 0;
    }
    .search-bar-big input::placeholder { color: var(--muted); }
    .search-bar-big button {
      padding: 12px 28px; background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border: none; border-radius: 100px; color: #fff; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s; white-space: nowrap; flex-shrink: 0;
    }
    .search-bar-big button:hover { opacity: 0.88; }

    .search-tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 22px; max-width: 680px; }
    .stag {
      padding: 7px 16px; border-radius: 100px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.18s; white-space: nowrap;

    .stag:hover { border-color: rgba(167,139,250,0.4); color: #a78bfa; background: rgba(167,139,250,0.07); }

    .result-wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px 96px; }
    .result-section-title {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
    }
    .result-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .color-result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 48px; }
    .color-result-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
      overflow: hidden; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .color-result-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.15); border-color: rgba(167,139,250,0.22); }
    .crc-swatch { height: 140px; position: relative; cursor: pointer; }
    .crc-copy-hint {
      position: absolute; inset: 0; background: rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700; color: #fff; opacity: 0; transition: opacity 0.2s;

    .crc-body { padding: 14px; }
    .crc-name { font-size: 0.92rem; font-weight: 800; margin-bottom: 5px; letter-spacing: -0.015em; }
    .crc-hex { font-size: 0.78rem; font-family: monospace; font-weight: 700; color: var(--muted); margin-bottom: 3px; letter-spacing: 0.04em; cursor: pointer; transition: color 0.15s; }

    .crc-harmony { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }

    .crc-h-label { font-size: 0.6rem; color: var(--muted); width: 100%; margin-top: 4px; }

// ── COLOR UTILITY ──
function hexToRgb(hex) {
  const v = parseInt(hex.replace('#',''), 16);
  return [(v>>16)&255, (v>>8)&255, v&255];
}
function rgbToHex(r,g,b) {
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('').toUpperCase();
}
function hexToHsl(hex) {
  let [r,g,b] = hexToRgb(hex).map(x=>x/255);
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}
  else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r:h=((g-b)/d+(g<b?6:0))/6;break;
      case g:h=((b-r)/d+2)/6;break;
      case b:h=((r-g)/d+4)/6;break;
    }
  }
  return [h*360, s*100, l*100];
}
function hslToHex(h,s,l) {
  s/=100;l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>Math.round((l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1))))*255);
  return rgbToHex(f(0),f(8),f(4));
}
function cl(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function genHarmony(hex) {
  const [h,s,l] = hexToHsl(hex);
  return {
    analogous:   [hslToHex((h+30)%360,s,l), hslToHex((h-30+360)%360,s,l)],
    complementary: hslToHex((h+180)%360,s,l),
    triadic:     [hslToHex((h+120)%360,s,l), hslToHex((h+240)%360,s,l)],
    tints:       [hslToHex(h,s,cl(l+18,5,92)), hslToHex(h,s,cl(l+34,5,92))],
    shades:      [hslToHex(h,s,cl(l-18,5,92)), hslToHex(h,s,cl(l-34,5,92))],
    saturated:   hslToHex(h,cl(s+20,0,100),l),
    desaturated: hslToHex(h,cl(s-20,0,100),l),
  };
}
function isLight(hex) {
  const [r,g,b]=hexToRgb(hex);
  return (0.299*r+0.587*g+0.114*b)>140;
}

// ── SEARCH LOGIC ──
function normalize(str) {
  return str.toLowerCase().replace(/\s+/g, '');
}

function searchMoods(query) {
  const q = normalize(query);
  const results = [];
  for (const mood of MOOD_DB) {
    let score = 0;
    for (const tag of mood.tags) {
      if (normalize(tag) === q) { score += 10; break; }
      if (q.includes(normalize(tag)) || normalize(tag).includes(q)) { score += 3; }
      // partial word match
      const words = query.toLowerCase().split(/\s+/);
      for (const w of words) {
        if (w.length >= 2 && normalize(tag).includes(normalize(w))) score += 1;
      }
    }
    if (score > 0) results.push({...mood, score});
  }
  return results.sort((a,b) => b.score - a.score).slice(0, 5);
}

function searchColorNames(query) {
  const q = normalize(query);
  const results = [];
  for (const c of COLOR_NAME_DB) {
    const allNames = [c.name, ...(c.aliases || [])];
    let score = 0;
    for (const n of allNames) {
      const nn = normalize(n);
      if (nn === q) { score += 10; break; }
      if (nn.includes(q) || q.includes(nn)) { score += 5; }
    }
    if (score > 0) results.push({...c, score});
  }
  return results.sort((a,b)=>b.score-a.score).slice(0, 4);
}

// ── RENDER HELPERS ──
function copyText(text) {
  navigator.clipboard.writeText(text).catch(()=>{});
  const t = document.getElementById('copyToast');
  t.textContent = `${text} 복사됨 ✓`;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 1800);
}

function swatchHtml(hex, size='normal') {
  const [r,g,b] = hexToRgb(hex);
  return hex.toUpperCase();
}

function renderColorCards(colors, names=[]) {
  return colors.map((hex, i) => {
    const [r,g,b] = hexToRgb(hex.startsWith('#') ? hex : '#'+hex);
    const h = hex.toUpperCase().startsWith('#') ? hex.toUpperCase() : '#'+hex.toUpperCase();
    const name = names[i] || '';
    const textColor = isLight(h) ? 'rgba(0,0,0,0.55)' : 'rgba(255,255,255,0.85)';
    return `
      <div class="color-result-card">
        <div class="crc-swatch" style="background:${h}" data-hex="${h}">
          <div class="crc-copy-hint" style="color:${textColor}">클릭해서 복사</div>
        </div>
        <div class="crc-body">
          ${name ? `<div class="crc-name">${name}</div>` : ''}
          <div class="crc-hex" data-hex="${h}">${h}</div>
          <div class="crc-rgb" data-rgb="rgb(${r}, ${g}, ${b})">rgb(${r}, ${g}, ${b})</div>
        </div>
      </div>`;
  }).join('');
}

function relatedFromSearchData(query) {
  if (typeof SEARCH_DATA === 'undefined') return {palettes:[], gradients:[]};
  const q = normalize(query);
  const palettes = SEARCH_DATA.filter(d => d.type==='palette' && (
    normalize(d.name).includes(q) || normalize(d.mood).includes(q) ||
    query.split(' ').some(w=>w.length>=2 && (normalize(d.name).includes(normalize(w))||normalize(d.mood).includes(normalize(w))))
  )).slice(0,4);
  const gradients = SEARCH_DATA.filter(d => d.type==='gradient' && (
    normalize(d.name).includes(q) || normalize(d.mood).includes(q) ||
    query.split(' ').some(w=>w.length>=2 && (normalize(d.name).includes(normalize(w))||normalize(d.mood).includes(normalize(w))))
  )).slice(0,3);
  return {palettes, gradients};
}

// ── RENDER RESULTS ──
function renderResults(query) {
  const moods = searchMoods(query);
  const colorMatches = searchColorNames(query);
  const related = relatedFromSearchData(query);

  if (!moods.length && !colorMatches.length && !related.palettes.length && !related.gradients.length) {
    return `<div class="search-empty-state">
      <div style="font-size:2.5rem;margin-bottom:16px;">🔍</div>
      <h3>"${query}"에 대한 결과를 찾지 못했어요</h3>
      <p>다른 단어로 검색해 보세요. (예: 따뜻한, 봄날, 바다, 레트로, 핑크)</p>
    </div>`;
  }

  let html = '';

  // ── COLOR NAME MATCHES ──
  if (colorMatches.length) {
    html += `<p class="result-section-title">색상 직접 검색</p>`;
    html += `<div class="color-result-grid">`;
    html += colorMatches.map(c => {
      const [r,g,b] = hexToRgb(c.hex);
      const textColor = isLight(c.hex) ? 'rgba(0,0,0,0.55)' : 'rgba(255,255,255,0.85)';
      return `
        <div class="color-result-card">
          <div class="crc-swatch" style="background:${c.hex}" data-hex="${c.hex}">
            <div class="crc-copy-hint" style="color:${textColor}">클릭해서 복사</div>
          </div>
          <div class="crc-body">
            <div class="crc-name">${c.name}</div>
            <div class="crc-hex" data-hex="${c.hex}">${c.hex.toUpperCase()}</div>
            <div class="crc-rgb" data-rgb="rgb(${r},${g},${b})">rgb(${r}, ${g}, ${b})</div>
          </div>
        </div>`;
    }).join('');
    html += `</div>`;
    // Harmony for first color match
    html += renderHarmonyDetail(colorMatches[0].hex, colorMatches[0].name);
  }

  // ── MOOD MATCHES ──
  moods.forEach((mood, mi) => {
    html += `<p class="result-section-title">${mi===0 && !colorMatches.length ? '무드 색상 결과' : '관련 무드'}</p>`;
    html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:28px;">`;
    html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <span style="font-size:1rem;font-weight:800;">${mood.name}</span>
      <span style="font-size:0.78rem;color:var(--muted);">${mood.desc}</span>
    </div>`;
    // 5 swatches horizontal
    html += `<div style="display:flex;gap:8px;margin-bottom:20px;">`;
    mood.colors.forEach(hex => {
      const [r,g,b] = hexToRgb(hex);
      const tc = isLight(hex)?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.9)';
      html += `<div style="flex:1;height:80px;border-radius:12px;background:${hex};cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;transition:transform 0.15s;"
                    data-hex="${hex}"
                    onmouseover="this.style.transform='scaleY(1.06)'"
                    onmouseleave="this.style.transform='scaleY(1)'"
                    class="mood-main-swatch">
        <span style="font-size:0.6rem;font-weight:700;color:${tc};letter-spacing:0.04em;">${hex.toUpperCase()}</span>
      </div>`;
    });
    html += `</div>`;
    // individual color info row
    html += `<div class="color-result-grid" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:0;">`;
    mood.colors.forEach(hex => {
      const [r,g,b] = hexToRgb(hex);
      const tc = isLight(hex)?'rgba(0,0,0,0.55)':'rgba(255,255,255,0.85)';
      html += `<div class="color-result-card">
        <div class="crc-swatch" style="background:${hex};height:60px;" data-hex="${hex}">
          <div class="crc-copy-hint" style="color:${tc}">복사</div>
        </div>
        <div class="crc-body" style="padding:8px 10px;">
          <div class="crc-hex" style="font-size:0.75rem;" data-hex="${hex}">${hex.toUpperCase()}</div>
          <div class="crc-rgb" style="font-size:0.65rem;" data-rgb="rgb(${r},${g},${b})">rgb(${r},${g},${b})</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
    // Harmony for first mood color
    if (mi === 0) html += renderHarmonyDetail(mood.colors[0]);
  });

  // ── RELATED PALETTES ──
  if (related.palettes.length) {
    html += `<p class="result-section-title">연관 팔레트</p>`;
    html += `<div class="related-palette-list">`;
    related.palettes.forEach(d => {
      const swatches = d.colors.map(c=>`<div class="related-pal-sw" style="background:${c}"></div>`).join('');
      html += `<a href="palettes.html" class="related-pal-item">
        <div class="related-pal-swatches">${swatches}</div>
        <div class="related-pal-info">
          <div class="related-pal-name">${d.name}</div>
          <div class="related-pal-meta">${d.mood}</div>
        </div>
        <span class="related-pal-arrow">→</span>
      </a>`;
    });
    html += `</div>`;
  }

  // ── RELATED GRADIENTS ──
  if (related.gradients.length) {
    html += `<p class="result-section-title">연관 그라데이션</p>`;
    html += `<div class="grad-result-grid">`;
    related.gradients.forEach(d => {
      html += `<div class="grad-result-item">
        <div class="grad-result-bar" style="background:${d.css}"></div>
        <div class="grad-result-body">
          <div>
            <div class="grad-result-name">${d.name}</div>
            <div class="grad-result-mood">${d.mood}</div>
          </div>
          <button class="grad-result-copy" data-css="${d.css}">CSS 복사</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  return html;
}

// ── EVENT BINDING after render ──
function bindResultEvents() {
  // Swatch / hex copy
  document.querySelectorAll('[data-hex]').forEach(el => {
    el.addEventListener('click', () => copyText(el.dataset.hex));
  });
  document.querySelectorAll('[data-rgb]').forEach(el => {
    el.addEventListener('click', () => copyText(el.dataset.rgb));
  });
  document.querySelectorAll('.mood-main-swatch').forEach(el => {
    el.addEventListener('click', () => copyText(el.dataset.hex));
  });
  // Grad CSS copy
  document.querySelectorAll('.grad-result-copy').forEach(btn => {
    btn.addEventListener('click', () => {
      copyText(`background: ${btn.dataset.css};`);
      btn.textContent='복사됨 ✓'; btn.classList.add('copied');
      setTimeout(()=>{btn.textContent='CSS 복사';btn.classList.remove('copied');},1800);
    });
  });
  // Harmony swatches
  document.querySelectorAll('.hd-swatch').forEach(el => {
    el.addEventListener('click', () => copyText(el.dataset.hex));
  });
  document.querySelectorAll('.hd-hex-label').forEach(el => {
    el.addEventListener('click', () => copyText(el.dataset.hex));
  });
}

// ── MAIN SEARCH ──
let lastQuery = '';
function doSearch(q) {
  if (!q.trim()) return;
  lastQuery = q.trim();
  addHistory(lastQuery);
  document.getElementById('mainSearchInput').value = lastQuery;

  const rWrap = document.getElementById('resultWrap');
  const initGrid = document.getElementById('initialGrid');
  rWrap.style.display = 'block';
  initGrid.style.display = 'none';
  rWrap.innerHTML = renderResults(lastQuery);
  bindResultEvents();
  rWrap.scrollIntoView({behavior:'smooth', block:'start'});
}

document.getElementById('searchSubmitBtn').addEventListener('click', () => {
  doSearch(document.getElementById('mainSearchInput').value);
});
document.getElementById('mainSearchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch(document.getElementById('mainSearchInput').value);
});
document.querySelectorAll('.stag').forEach(btn => {
  btn.addEventListener('click', () => doSearch(btn.textContent));
});

// ── INITIAL SHOWCASE (popular moods before search) ──
function renderInitialGrid() {
  const featured = ['봄날 벚꽃', '따뜻한 온기', '깊은 바다', '신비로운 보라', '레트로 빈티지', '비비드 팝'];
  const moods = featured.map(name => MOOD_DB.find(m => m.name === name)).filter(Boolean);
  const el = document.getElementById('initialGrid2');
  if (!el) return;
  el.innerHTML = moods.map(m => {
    const hex = m.colors[Math.floor(m.colors.length/2)];
    const [r,g,b] = hexToRgb(hex);
    const tc = isLight(hex)?'rgba(0,0,0,0.55)':'rgba(255,255,255,0.85)';
    return `
      <div class="color-result-card" style="cursor:pointer;" onclick="doSearch('${m.name}')">
        <div style="height:100px;background:linear-gradient(135deg,${m.colors.join(',')});"></div>
        <div class="crc-body">
          <div class="crc-name">${m.name}</div>
          <div style="font-size:0.72rem;color:var(--muted);">${m.desc}</div>
          <div style="display:flex;gap:4px;margin-top:10px;">
            ${m.colors.slice(0,5).map(c=>`<div style="width:20px;height:20px;border-radius:5px;background:${c};"></div>`).join('')}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── URL PARAM ──
const urlQ = new URLSearchParams(location.search).get('q');
if (urlQ) {
  doSearch(urlQ);
} else {
  renderInitialGrid();
}
</script>
</body>
